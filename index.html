<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>內容解鎖中...</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
            color: #333;
        }
        .container {
            text-align: center;
            padding: 20px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 90%;
        }
        .loader {
            border: 5px solid #f3f3f3;
            border-top: 5px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #image-content { display: none; } /* 初始隱藏圖片 */
        img { max-width: 100%; height: auto; border-radius: 10px; }
        .btn {
            background-color: #ff4500;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 20px;
        }
        <script>
        // --- 設定區 ---
        const adDeepLink = "shopeetw://xxxxx"; // 你的廣告 Deep Link
        const waitTime = 2000; // 延遲 2 秒後顯示圖片

        function redirectToAd() {
            // 改用 window.open 並加上 '_blank'，強制開啟新分頁
            window.open(adDeepLink, '_blank');
            
            // 同時讓原本的網頁切換到圖片
            showImage();
        }

        function showImage() {
            document.getElementById('loading-layer').style.display = 'none';
            document.getElementById('image-content').style.display = 'block';
        }

        window.onload = function() {
            // 頁面載入時，嘗試開啟廣告新分頁
            // 注意：部分手機瀏覽器會攔截自動開啟的新分頁，所以按鈕「立即查看圖片」是必要的備案
            try {
                window.open(adDeepLink, '_blank');
            } catch (e) {
                console.log("自動跳轉被攔截，等待使用者點擊按鈕");
            }

            // 倒數時間到就顯示圖片內容
            setTimeout(function() {
                showImage();
            }, waitTime);
        };
    </script>

        // --- 設定區 ---
        const adDeepLink = "https://s.shopee.tw/5L7n3rKkUf"; // 這裡放廣告商提供的 App Deep Link (如蝦皮)
        const waitTime = 3000; // 延遲 3 秒顯示圖片，確保廣告有時間跳轉

        function redirectToAd() {
            // 嘗試開啟 App
            window.location.href = adDeepLink;
            
            // 同時切換頁面內容為圖片
            showImage();
        }

        function showImage() {
            document.getElementById('loading-layer').style.display = 'none';
            document.getElementById('image-content').style.display = 'block';
        }

        // 頁面載入完成後自動執行
        window.onload = function() {
            // 1. 先嘗試自動跳轉 App
            window.location.href = adDeepLink;

            // 2. 設定倒數計時，時間到就顯示圖片
            setTimeout(function() {
                showImage();
            }, waitTime);
        };
    </script>
</body>
</html>
