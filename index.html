<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>內容驗證系統</title>
    <style>
        body { font-family: -apple-system, sans-serif; text-align: center; background-color: #f7f7f7; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); max-width: 400px; width: 90%; }
        .btn { background: #ff4500; color: white; border: none; padding: 15px 30px; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
        #pic-area { display: none; margin-top: 30px; padding-top: 20px; border-top: 2px dashed #eee; }
        img { max-width: 100%; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="card">
        <h2>驗證權限中...</h2>
        <p>點擊按鈕解鎖內容</p>
        
        <button class="btn" onclick="unlockContent()">點此解鎖並查看圖片</button>

        <div id="pic-area">
            <h3 style="color: #2ecc71;">✅ 驗證成功！</h3>
            <img src="" id="secret-img" alt="Secret Content">
        </div>
    </div>

    <script>
        function unlockContent() {
            // ==========================================
            // 【 1. 廣告連結清單 】
            // 你可以在括號內增加更多網址，記得用逗號分開，並都要加雙引號
            // ==========================================
            var adLinks = [
                "https://s.shopee.tw/5AoOPBftOI",
                "https://s.shopee.tw/20rMdOMkqY",
                "https://s.shopee.tw/8fOGZgrDHM",
                "https://s.shopee.tw/7fVjNsLZ3h",
                "https://s.shopee.tw/1gEWErqaym",
                "https://s.shopee.tw/8ARzyparfc",
                "https://s.shopee.tw/BPiS2Kjid"
            ];

            // ==========================================
            // 【 2. 圖片網址 】
            // ==========================================
            var imgUrl = "https://i.postimg.cc/Zn0gBscS/IMG-20260408-031540.jpg";

            // --- 隨機挑選邏輯 ---
            // 從清單中隨機選一個索引
            var randomIndex = Math.floor(Math.random() * adLinks.length);
            var selectedAd = adLinks[randomIndex];

            // 執行：開啟隨機選中的廣告
            window.open(selectedAd, "_blank");
            
            // 執行：顯示圖片
            var imgTag = document.getElementById('secret-img');
            imgTag.src = imgUrl;
            document.getElementById('pic-area').style.display = 'block';

            alert("已為您分配廣告分流，請回到原頁面查看圖片。");
        }
    </script>

</body>
</html>
